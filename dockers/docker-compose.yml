
networks:
  services:
    name: ${COMPOSE_NETWORK_NAME:-healytics_services}
    driver: bridge

# --- Kong Database Connection (shared by bootstrap + control-plane) ---
x-kong-db-config: &kong-db-env
  KONG_DATABASE: postgres
  KONG_PG_HOST: postgres
  KONG_PG_PORT: ${POSTGRES_PORT:-5432}
  KONG_PG_DATABASE: ${POSTGRES_DB:?POSTGRES_DB is required}
  KONG_PG_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
  KONG_PG_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
  KONG_LICENSE_DATA: "${KONG_LICENSE_DATA:-}"

# --- Kong Network / Listener Config (control-plane only) ---
# Allow Admin API to be accessed without auth for local dev.
# For production, enforce RBAC and pass Kong-Admin-Token in the deck service.
x-kong-network-config: &kong-network-env
  KONG_ADMIN_LISTEN: "0.0.0.0:8001, 0.0.0.0:8444 ssl"

# --- RabbitMQ Common Config (shared by all cluster nodes) ---
x-rabbitmq-common: &rabbitmq-common
  image: rabbitmq:3-management
  restart: on-failure
  profiles: ["dev", "prod"]
  networks:
    - services
  volumes:
    - ./rabbitmq/certs:/certs:ro
    - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    - ./rabbitmq/.erlang.cookie:/var/lib/rabbitmq/.erlang.cookie
    - ./rabbitmq/cluster-entrypoint.sh:/usr/local/bin/cluster-entrypoint.sh
  entrypoint: /usr/local/bin/cluster-entrypoint.sh

services:

  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    image: healytics-postgres:16-postgis
    container_name: docker_postgres
    profiles: ["dev", "prod"]
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - services
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 5s
      timeout: 10s
      retries: 10

  postgres-init:
    image: healytics-postgres:16-postgis
    container_name: postgres-init
    profiles: ["dev", "prod"]
    networks:
      - services
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./init-databases.sh:/init-databases.sh:ro
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_EXTRA_DATABASES: ${POSTGRES_EXTRA_DATABASES:-}
    entrypoint: ["bash", "/init-databases.sh"]

  redis:
    image: redis:latest
    container_name: redis
    profiles: ["dev", "prod"]
    restart: always
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --replica-read-only
      - "no"
      - --save
      - "20 1"
      - --loglevel
      - warning
      - --requirepass
      - ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - services
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" --no-auth-warning ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

  # =============================================================================
  # Backend API (deployed by Jenkins via immutable registry image tags)
  # Image and tag are supplied by deploy-backend.sh → deploy.env.
  # Do NOT hardcode defaults here — deploy-backend.sh is the single source.
  # =============================================================================

  backend:
    image: '${BACKEND_IMAGE:-nonameaaaa/healytics_backend}:${BACKEND_TAG:-latest}'
    container_name: healytics-backend
    profiles: ["backend-prod"]
    restart: unless-stopped
    env_file: backend.env
    environment:
      # --- Infrastructure overrides (Docker-internal DNS / in-container paths) ---
      # These MUST stay here because they reference Compose service names or
      # container-local paths that cannot be known outside docker-compose.yml.
      NODE_ENV: production
      PORT: 8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_SSL: ${POSTGRES_SSL:-false}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      RABBITMQ_URL: amqps://${RABBITMQ_BACKEND_USER:-backend}:${RABBITMQ_BACKEND_PASS_URLENCODED:-backend%40rmq123}@rabbitmq-haproxy:5671/${RABBITMQ_BACKEND_VHOST:-healytics}
      RABBITMQ_QUEUE_CHECKOUT: ${RABBITMQ_QUEUE_CHECKOUT:-checkout_queue}
      RABBITMQ_CA_CERT: /app/certs/ca_certificate.pem
      RABBITMQ_CLIENT_CERT: /app/certs/client_localhost_certificate.pem
      RABBITMQ_CLIENT_KEY: /app/certs/client_localhost_key.pem
    volumes:
      - ./rabbitmq/certs:/app/certs:ro
    networks:
      - services
    # NOTE: infrastructure services (postgres, redis, rabbitmq) run under
    # profiles "dev"/"prod". Cross-profile depends_on is invalid in Compose.
    # deploy-backend.sh already ensures infra is up before starting backend.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # =============================================================================
  # Admin Panel (Flutter web — served by Nginx)
  # Image and tag are supplied by deploy-panel.sh → deploy-panel.env.
  # =============================================================================

  panel:
    image: '${PANEL_IMAGE:-nonameaaaa/healytics_panel}:${PANEL_TAG:-latest}'
    container_name: healytics-panel
    profiles: ["panel-prod"]
    restart: unless-stopped
    ports:
      - "${PANEL_PORT:-3000}:80"
    networks:
      - services
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/index.html || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  kong-bootstrap:
    image: '${GW_IMAGE:-kong/kong-gateway:3.12.0.2}'
    container_name: kong-bootstrap
    profiles: ["dev", "prod"]
    networks:
      - services
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    restart: on-failure
    environment:
      <<: *kong-db-env
      KONG_PASSWORD: ${KONG_ADMIN_PASSWORD}
    command: kong migrations bootstrap

  kong-cp:
    image: '${GW_IMAGE:-kong/kong-gateway:3.12.0.2}'
    container_name: kong-cp
    profiles: ["dev", "prod"]
    restart: on-failure
    networks:
      - services
    environment:
      <<: [*kong-db-env, *kong-network-env]
      KONG_ADMIN_GUI_LISTEN: "0.0.0.0:8002, 0.0.0.0:8445 ssl"
      KONG_ADMIN_GUI_URL: http://${GW_HOST:-localhost}:8002
      KONG_PASSWORD: ${KONG_ADMIN_PASSWORD}
    depends_on:
      kong-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8444:8444"
      - "8002:8002"
      - "8445:8445"

  # This service runs ONCE to apply your config
  kong-configurator:
    image: kong/deck:latest
    container_name: kong-configurator
    profiles: ["dev", "prod"]
    networks:
      - services
    volumes:
      - ./kong.yml:/kong.yml  # Mount your config file here
    environment:
      DECK_KONG_ADDR: http://kong-cp:8001
      # Use this if RBAC is enforced:
      # DECK_HEADERS: "Kong-Admin-Token:${KONG_ADMIN_PASSWORD}" 
    command: ["gateway", "sync", "/kong.yml"]
    depends_on:
      kong-cp:
        condition: service_healthy

  # =============================================================================
  # RabbitMQ Cluster (3 nodes + HAProxy)
  # =============================================================================

  rabbitmq-cert-gen:
    image: rabbitmq-cert-gen
    container_name: rabbitmq-cert-gen
    profiles: ["dev", "prod"]
    build:
      context: ./rabbitmq/tls-gen
      dockerfile: Dockerfile
    volumes:
      - ./rabbitmq/certs:/certs
    healthcheck:
      test: ["CMD-SHELL", "make verify"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    environment:
      - CN=localhost
    networks:
      - services

  rabbitmq1:
    <<: *rabbitmq-common
    hostname: rabbitmq1
    container_name: rabbitmq1
    depends_on:
      rabbitmq-cert-gen:
        condition: service_healthy
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
    volumes:
      - ./rabbitmq/certs:/certs:ro
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/.erlang.cookie:/var/lib/rabbitmq/.erlang.cookie
      - ./rabbitmq/cluster-entrypoint.sh:/usr/local/bin/cluster-entrypoint.sh
      - rabbitmq1-data:/var/lib/rabbitmq/
      - rabbitmq1-logs:/var/log/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  rabbitmq2:
    <<: *rabbitmq-common
    hostname: rabbitmq2
    container_name: rabbitmq2
    depends_on:
      rabbitmq1:
        condition: service_healthy
    environment:
      - JOIN_CLUSTER_HOST=rabbitmq1
    volumes:
      - ./rabbitmq/certs:/certs:ro
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/.erlang.cookie:/var/lib/rabbitmq/.erlang.cookie
      - ./rabbitmq/cluster-entrypoint.sh:/usr/local/bin/cluster-entrypoint.sh
      - rabbitmq2-data:/var/lib/rabbitmq/
      - rabbitmq2-logs:/var/log/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  rabbitmq3:
    <<: *rabbitmq-common
    hostname: rabbitmq3
    container_name: rabbitmq3
    depends_on:
      rabbitmq1:
        condition: service_healthy
    environment:
      - JOIN_CLUSTER_HOST=rabbitmq1
    volumes:
      - ./rabbitmq/certs:/certs:ro
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/.erlang.cookie:/var/lib/rabbitmq/.erlang.cookie
      - ./rabbitmq/cluster-entrypoint.sh:/usr/local/bin/cluster-entrypoint.sh
      - rabbitmq3-data:/var/lib/rabbitmq/
      - rabbitmq3-logs:/var/log/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  rabbitmq-haproxy:
    image: haproxy:2.4
    container_name: rabbitmq-haproxy
    profiles: ["dev", "prod"]
    restart: on-failure
    volumes:
      - ./rabbitmq/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./rabbitmq/certs:/certs:ro
    depends_on:
      rabbitmq1:
        condition: service_healthy
      rabbitmq2:
        condition: service_healthy
      rabbitmq3:
        condition: service_healthy
    ports:
      - 15671:15671
      - 5671:5671
      - 1936:1936
    networks:
      - services

  rabbitmq-init:
    image: alpine:latest
    container_name: rabbitmq-init
    profiles: ["dev", "prod"]
    restart: on-failure
    networks:
      - services
    depends_on:
      rabbitmq1:
        condition: service_healthy
      rabbitmq2:
        condition: service_healthy
      rabbitmq3:
        condition: service_healthy
    volumes:
      - ./rabbitmq/init-rabbitmq.sh:/init-rabbitmq.sh:ro
      - ./rabbitmq/certs:/certs:ro
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_BACKEND_USER: ${RABBITMQ_BACKEND_USER}
      RABBITMQ_BACKEND_PASS: ${RABBITMQ_BACKEND_PASS}
      RABBITMQ_BACKEND_VHOST: ${RABBITMQ_BACKEND_VHOST}
    entrypoint: ["sh", "-c", "apk add --no-cache curl >/dev/null 2>&1 && sh /init-rabbitmq.sh"]

  # =============================================================================
  # Jenkins Controller
  #   Profiles:
  #     ci       — production on VPS (agents connect remotely via public URL)
  #     ci-local — local testing (controller + agent on same Docker network)
  # =============================================================================

  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    image: ${JENKINS_IMAGE:-healytics-jenkins-controller:lts}
    container_name: jenkins-controller
    profiles: ["ci", "ci-local"]
    restart: unless-stopped
    environment:
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false
      CASC_JENKINS_CONFIG: /usr/share/jenkins/ref/casc.yml
      JENKINS_URL: ${JENKINS_URL:-http://localhost:8081}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD:-admin}
      # Shared secret to authenticate incoming GitHub webhooks.
      # NOT a GitHub credential — only authorizes webhook delivery.
      WEBHOOK_TOKEN: ${WEBHOOK_TOKEN:-changeme}
      WEBHOOK_TOKEN_PANEL: ${WEBHOOK_TOKEN_PANEL:-changeme-panel}
    ports:
      - "${JENKINS_BIND_ADDR:-127.0.0.1}:${JENKINS_PORT:-8081}:8080"
      - "${JENKINS_BIND_ADDR:-127.0.0.1}:${JENKINS_JNLP_PORT:-50000}:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    networks:
      - services
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/login > /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  # =============================================================================
  # Jenkins Inbound Agent
  #   Profiles:
  #     ci-agent — standalone agent connecting to a remote controller (VPS)
  #     ci-local — local testing (auto-connects to jenkins-controller on same
  #                Docker network; no secret needed — uses WebSocket)
  # =============================================================================

  jenkins-agent:
    build:
      context: ./jenkins
      dockerfile: Dockerfile.agent
    image: ${JENKINS_AGENT_IMAGE:-healytics-jenkins-agent:node22}
    container_name: jenkins-agent
    profiles: ["ci-agent", "ci-local"]
    restart: unless-stopped
    environment:
      # ci-local: agent reaches the controller via Docker DNS.
      # ci-agent (remote): override JENKINS_AGENT_URL in .env with the VPS URL.
      JENKINS_URL: ${JENKINS_AGENT_URL:-http://jenkins-controller:8080}
      JENKINS_SECRET: ${JENKINS_AGENT_SECRET:-}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD:-admin}
      AGENT_NAME: local-docker-builder
      AGENT_WORKDIR: /home/jenkins/agent
      HEALYTICS_VPS_HOST: ${HEALYTICS_VPS_HOST:-}
      HEALYTICS_VPS_SSH_USER: ${HEALYTICS_VPS_SSH_USER:-deploy}
      # Host-side repo path — used by Jenkinsfile for docker-run volume mounts.
      HEALYTICS_REPO_PATH: ${HEALYTICS_REPO_PATH:-/Volumes/WD850X/Users/workspace/datn/Healytics}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - jenkins_agent_workdir:/home/jenkins/agent
      # Mount local Healytics repo directly as the job workspace.
      # This lets the pipeline skip git clone and work on the host source tree.
      - ${HEALYTICS_REPO_PATH:-/Volumes/WD850X/Users/workspace/datn/Healytics}:/home/jenkins/agent/workspace/healytics-backend
      - ${HOME}/.healytics-jenkins-docker:/root/.docker
      - ${HOME}/.ssh:/root/.ssh:ro
    networks:
      - services
    depends_on:
      jenkins:
        condition: service_healthy
        required: false

  # =============================================================================
  # Cloudflare Tunnel (configurator + token-reader + cloudflared)
  # =============================================================================

  # This service runs ONCE to configure the Cloudflare Tunnel via API
  cloudflare-configurator:
    image: alpine:latest
    container_name: cloudflare-configurator
    profiles: ["dev", "prod"]
    networks:
      - services
    volumes:
      - ./cloudflare-tunnel-setup.sh:/setup.sh:ro
      - ./.env:/app/.env
      - ./cloudflare-tunnels.json:/app/cloudflare-tunnels.json:ro
      - tunnel-token:/tmp/tunnel-token
    entrypoint: ["sh", "-c", "apk add --no-cache curl jq >/dev/null 2>&1 && sh /setup.sh"]
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID}
      CLOUDFLARE_TUNNELS_FILE: ${CLOUDFLARE_TUNNELS_FILE:-/app/cloudflare-tunnels.json}
    depends_on:
      kong-cp:
        condition: service_healthy

  # Reads the tunnel token from the shared volume (written by cloudflare-configurator).
  cloudflare-token-reader:
    image: alpine:latest
    container_name: cloudflare-token-reader
    profiles: ["dev", "prod"]
    networks:
      - services
    volumes:
      - tunnel-token:/tmp/tunnel-token
    entrypoint: ["sh", "-c"]
    command:
      - |
        if [ -f /tmp/tunnel-token/TUNNEL_TOKEN ] && [ -s /tmp/tunnel-token/TUNNEL_TOKEN ]; then
          echo "Using tunnel token from shared volume"
        else
          echo "ERROR: No tunnel token found. Run cloudflare-configurator first."
          exit 1
        fi
    depends_on:
      cloudflare-configurator:
        condition: service_completed_successfully

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    profiles: ["dev", "prod"]
    restart: on-failure
    networks:
      - services
    command: ["tunnel", "--no-autoupdate", "run", "--token-file", "/tmp/tunnel-token/TUNNEL_TOKEN"]
    volumes:
      - tunnel-token:/tmp/tunnel-token:ro
    depends_on:
      cloudflare-token-reader:
        condition: service_completed_successfully

volumes:
  pgdata:
  redisdata:
  rabbitmq1-data:
  rabbitmq1-logs:
  rabbitmq2-data:
  rabbitmq2-logs:
  rabbitmq3-data:
  rabbitmq3-logs:
  jenkins_home:
  jenkins_agent_workdir:
  tunnel-token:
