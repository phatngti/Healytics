global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: healytics-backend
    scheme: __BACKEND_METRICS_SCHEME__
    metrics_path: __BACKEND_METRICS_PATH__
    authorization:
      type: Bearer
      credentials_file: /tmp/metrics_bearer_token
    static_configs:
      - targets:
          - __BACKEND_METRICS_TARGET__

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
