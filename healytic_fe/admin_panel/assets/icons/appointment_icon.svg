<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 24 24" role="img" aria-labelledby="title desc">
<title id="title">Green Appointment Icon (Filled)</title>
<desc id="desc">A filled green calendar with a white checkmark.</desc>
<defs>
<clipPath id="r">
<rect x="3" y="4" width="18" height="17" rx="2"/>
</clipPath>
</defs>
<!-- Calendar body -->
<rect x="3" y="4" width="18" height="17" rx="2" fill="#16a34a"/>
<!-- Binding rings (knobs) -->
<g fill="#16a34a">
<rect x="7.25" y="2" width="1.5" height="4" rx="0.75"/>
<rect x="15.25" y="2" width="1.5" height="4" rx="0.75"/>
</g>
<!-- Header divider -->
<path d="M3 8h18" stroke="#0f7a33" stroke-width="1"/>
<!-- Checkmark -->
<g clip-path="url(#r)">
<path d="M8 13.5l2.5 2.5L16 10.5" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</g>
</svg>