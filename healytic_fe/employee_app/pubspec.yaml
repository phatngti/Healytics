name: employee_app
description: "Healytics Employee App — Appointment & Revenue Management"
publish_to: 'none'
version: 1.0.0+1

resolution: workspace

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  hooks_riverpod: ^3.0.3
  shadcn_ui: ^0.35.0
  flex_color_scheme: ^8.3.0
  go_router: ^16.2.4
  flutter_hooks: ^0.21.3+1
  riverpod_annotation: ^3.0.3
  font_awesome_flutter: ^10.10.0
  material_symbols_icons: ^4.2874.0
  shared_preferences: ^2.5.3
  path: ^1.9.1
  path_provider: ^2.1.5
  flutter_svg: ^2.2.1
  flutter_native_splash: ^2.4.7
  lottie: ^3.3.2
  flutter_form_builder: ^10.2.0
  freezed_annotation: ^3.1.0
  freezed: ^3.2.3
  json_annotation: ^4.9.0
  equatable: ^2.0.7
  flutter_riverpod: ^3.0.3
  http: ^1.6.0
  user_openapi:
    path: ../user_app/openapi
  common:
    path: ../common
  logging: ^1.3.0
  package_info_plus: ^9.0.0
  device_info_plus: ^11.5.0
  drift: ^2.28.1
  drift_flutter: ^0.2.5
  flutter_displaymode: ^0.6.0
  jwt_decoder: ^2.0.1
  fl_chart: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  custom_lint: ^0.8.0
  riverpod_lint: ^3.0.3
  riverpod_generator: ^3.0.3
  build_runner: ^2.7.1
  go_router_builder: ^4.1.0
  json_serializable: ^6.11.1
  drift_dev: ^2.28.0

flutter:
  uses-material-design: true

  assets:
    - assets/store.dev.json
    - assets/store.uat.json
    - assets/store.prod.json
    - assets/icons/
    - assets/images/
    - assets/animations/
