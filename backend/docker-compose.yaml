services:
  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - '6380:6379'
    command: >
      redis-server
        --appendonly yes
        --replica-read-only no
        --save 20 1
        --loglevel warning
        --requirepass redispass!@#123
    volumes:
      - redisdata:/data
    networks:
      - services

  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - '5434:5432'
    environment:
      POSTGRES_PASSWORD: 'admin@123'
      POSTGRES_USER: 'admin'
      POSTGRES_DB: 'mydb'
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - services

networks:
  services:
    driver: bridge

volumes:
  redisdata:
  pgdata:
