[pytest]
# pytest-asyncio v0.23+ setting.
# "auto" means all async test functions are treated as async tests
# without needing @pytest.mark.asyncio on every single one.
asyncio_mode = auto

# Use a single event loop for the entire test session.
# Required when using session-scoped async fixtures (e.g. create_tables).
asyncio_default_fixture_loop_scope = session
